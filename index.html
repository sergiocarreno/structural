<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavericks Construction Calculator v8.6</title>
    <style>
        :root { --bg: #0b0e13; --card: #13181f; --brd: #263045; --acc: #f0a020; --txt: #dde3ef; --mut: #5a6880; --grn: #1db86a; --red: #e04545; --blu: #3a7bd5; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: 0 auto; }
        
        /* Brand Header */
        .brand-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 2px solid var(--acc); padding-bottom: 15px; }
        .logo { height: 60px; width: auto; }
        .brand-title { color: var(--acc); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 28px; font-weight: 900; }

        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 12px; padding: 24px; position: sticky; top: 20px; }
        h2 { font-size: 14px; color: var(--mut); text-transform: uppercase; margin: 20px 0 15px 0; border-top: 1px solid #263045; padding-top: 15px; }
        label { font-size: 11px; color: var(--mut); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; display: block; }
        select, input { width: 100%; padding: 12px; background: #1a2030; border: 1px solid var(--brd); border-radius: 8px; color: #fff; margin-bottom: 18px; font-size: 15px; box-sizing: border-box; }
        .helper-box { background: rgba(240, 160, 32, 0.05); border: 1px dashed var(--acc); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .result-container { display: flex; flex-direction: column; gap: 15px; }
        .opt-card { background: var(--card); border: 1px solid var(--brd); border-radius: 10px; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--mut); margin-bottom: 15px; }
        .wood { border-left-color: #8b5a2b; }
        .lvl { border-left-color: var(--acc); }
        .steel { border-left-color: var(--blu); }
        .opt-title { font-weight: 900; font-size: 20px; color: #fff; }
        .opt-meta { font-size: 12px; color: var(--mut); text-transform: uppercase; letter-spacing: 1px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-bottom: 8px; }
        .badge-wood { background: #4a3520; color: #d2b48c; }
        .badge-lvl { background: #413210; color: var(--acc); }
        .badge-steel { background: #1a2a40; color: var(--blu); }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .card { position: static; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-header">
        <img src="https://drive.google.com/thumbnail?id=1KYr8jq6O7WEJ1l9lgxMVESrLPKyTyBe5&sz=w500" alt="Mavericks Logo" class="logo">
        <h1 class="brand-title">Mavericks Construction Calculator</h1>
    </div>

    <div class="grid">
        <div class="card">
            <label>Species Group</label>
            <select id="species" onchange="calculate()">
                <option value="spf">SPF #2 (Standard Yard Stock)</option>
                <option value="df">Douglas Fir-Larch #2 (Heavy Duty)</option>
            </select>

            <label>Member Use</label>
            <select id="component" onchange="calculate()">
                <option value="floor">Floor Joist (1st/2nd Floor)</option>
                <option value="ceiling">Ceiling Joist (No Storage)</option>
                <option value="roof">Roof Rafters (Snow Load)</option>
                <option value="beam">Main Carrying Beam / Header</option>
            </select>

            <div class="helper-box">
                <label>Tributary Helper (Half A + Half B)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="spanA" value="12" oninput="calcTrib()" placeholder="Left">
                    <input type="number" id="spanB" value="12" oninput="calcTrib()" placeholder="Right">
                </div>
                <div style="font-size: 12px; color: var(--acc);">Trib: <b id="tribVal">12.0</b> ft</div>
            </div>

            <label>Clear Span (Length - ft)</label>
            <input type="number" id="span" value="12" step="0.1" oninput="calculate()">

            <label>Final Tributary Width (ft)</label>
            <input type="number" id="trib" value="12" step="0.1" oninput="calculate()">
        </div>

        <div id="results" class="result-container"></div>
    </div>
</div>

<script>
    function calcTrib() {
        const a = parseFloat(document.getElementById('spanA').value) || 0;
        const b = parseFloat(document.getElementById('spanB').value) || 0;
        const total = (a / 2) + (b / 2);
        document.getElementById('tribVal').innerText = total.toFixed(1);
        document.getElementById('trib').value = total.toFixed(1);
        calculate();
    }

    function calculate() {
        const species = document.getElementById('species').value;
        const component = document.getElementById('component').value;
        const span = parseFloat(document.getElementById('span').value) || 0;
        const trib = parseFloat(document.getElementById('trib').value) || 0;
        const results = document.getElementById('results');
        
        results.innerHTML = "";
        if (span <= 0) return;

        const mult = (species === 'df') ? 1.15 : 1.0;

        const data = {
            floor:   { "2x8": 12.3*mult, "2x10": 15.5*mult, "2x12": 18.9*mult },
            ceiling: { "2x6": 15.5*mult, "2x8": 20.5*mult, "2x10": 25.5*mult },
            roof:    { "2x6": 12.5*mult, "2x8": 16.2*mult, "2x10": 20.5*mult, "2x12": 25.0*mult }
        };

        if (['floor', 'ceiling', 'roof'].includes(component)) {
            const db = data[component];
            Object.keys(db).forEach(size => {
                if (db[size] >= span) {
                    addCard("wood", `${size} ${species.toUpperCase()} #2`, `Max: ${db[size].toFixed(1)} ft`, "✓ CODE OK");
                }
            });
        } else {
            const plf = trib * 70; 
            if (span <= 8 && plf < 1500) addCard("wood", "(2) 2x10 Header", "Dimensional", "Standard SPF/DF");
            if (span <= 12) addCard("lvl", "2-Ply 11-7/8\" LVL", "1.9E Rated", "Stable / No Shrink");
            if (span > 12) addCard("steel", "W8 x 18 I-Beam", "A36 Steel", "Max Headroom");
        }
    }

    function addCard(type, title, sub, meta) {
        const div = document.createElement('div');
        div.className = `opt-card ${type}`;
        div.innerHTML = `<div><span class="badge badge-${type}">${type.toUpperCase()}</span><div class="opt-meta">${sub}</div><div class="opt-title">${title}</div><div style="color:var(--grn); font-size:12px; font-weight:bold;">${meta}</div></div><div style="text-align:right; color:var(--acc); font-weight:900;">SELECT</div>`;
        document.getElementById('results').appendChild(div);
    }
    
    // Run calculation once on load to populate initial state
    window.onload = calcTrib;
</script>
</body>
</html>
