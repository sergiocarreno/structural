<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavericks Construction Calculator v9.6</title>
    <style>
        :root { --bg: #000; --card: #111; --brd: #444; --acc: #f0a020; --txt: #fff; --mut: #aaa; --grn: #0f0; --blu: #3af; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .wrapper { max-width: 1200px; margin: 0 auto; }
        .brand-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 3px solid var(--acc); padding-bottom: 12px; }
        .logo { height: 50px; width: auto; }
        .brand-title { color: var(--acc); text-transform: uppercase; margin: 0; font-size: 20px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .card { background: var(--card); border: 2px solid var(--brd); border-radius: 12px; padding: 20px; height: fit-content; position: sticky; top: 10px; }
        h2 { font-size: 13px; color: var(--acc); text-transform: uppercase; margin: 20px 0 10px 0; border-top: 1px solid var(--brd); padding-top: 15px; }
        label { font-size: 11px; color: #fff; text-transform: uppercase; font-weight: 900; margin-bottom: 6px; display: block; }
        select, input { width: 100%; padding: 14px; background: #000; border: 2px solid var(--brd); border-radius: 8px; color: #fff; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; font-weight: bold; }
        .helper-box { background: rgba(240, 160, 32, 0.1); border: 2px dashed var(--acc); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .info-btn { background: var(--acc); color: #000; border: none; border-radius: 4px; width: 22px; height: 22px; font-size: 14px; font-weight: 900; cursor: pointer; float: right; }
        .result-container { display: flex; flex-direction: column; gap: 12px; }
        .opt-card { background: var(--card); border: 2px solid var(--brd); border-radius: 12px; padding: 18px; display: flex; justify-content: space-between; align-items: center; }
        .wood { border-left: 10px solid #8b5a2b; border-color: #8b5a2b; }
        .lvl { border-left: 10px solid var(--acc); border-color: var(--acc); }
        .steel { border-left: 10px solid var(--blu); border-color: var(--blu); }
        .opt-title { font-weight: 900; font-size: 20px; color: #fff; margin-bottom: 4px; }
        .opt-meta { font-size: 11px; color: var(--mut); text-transform: uppercase; font-weight: bold; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .card { position: static; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-header">
        <img src="https://drive.google.com/thumbnail?id=1KYr8jq6O7WEJ1l9lgxMVESrLPKyTyBe5&sz=w500" alt="Mavericks Logo" class="logo">
        <h1 class="brand-title">Mavericks Construction Calculator</h1>
    </div>

    <div class="grid">
        <div class="card">
            <label>Load Scenario</label>
            <select id="houseType" onchange="calculate()">
                <option value="1">1-Story (Roof Load)</option>
                <option value="2" selected>2-Story (Floor + Roof)</option>
                <option value="3">2-Story + Finished Attic</option>
            </select>

            <label>Component Category</label>
            <select id="component" onchange="toggleInputs()">
                <option value="floor">Floor Joists</option>
                <option value="ceiling">Ceiling Joists</option>
                <option value="roof">Roof Rafters</option>
                <option value="beam">Beams & Headers</option>
                <option value="stud">Wall Studs</option>
                <option value="post">Posts</option>
            </select>

            <div id="species_div">
                <label>Species Group</label>
                <select id="species" onchange="calculate()">
                    <option value="spf">SPF #2 (Standard)</option>
                    <option value="df">Douglas Fir #2</option>
                </select>
            </div>

            <label id="mainLabel">Clear Span (Feet)</label>
            <input type="number" id="span" value="" step="0.1" oninput="toggleVisibility(); calculate();" placeholder="0.0">

            <div id="trib_section" style="display:none;">
                <label>Tributary Width (ft) <button class="info-btn" onclick="document.getElementById('modal').style.display='flex'">?</button></label>
                <div class="helper-box" id="helperBox" style="display:block;">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <input type="number" id="spanA" placeholder="Left" oninput="calcTrib()">
                        <input type="number" id="spanB" placeholder="Right" oninput="calcTrib()">
                    </div>
                    <div style="font-size: 13px; color: var(--acc); text-align:center; font-weight:bold;">Tributary: <span id="tribVal">0.0</span> ft</div>
                </div>
                <input type="number" id="trib" value="" step="0.1" oninput="calculate()" placeholder="TRIBUTARY WIDTH (FT) - Manual Entry...">
            </div>

            <div id="stud_div" style="display:none;">
                <label>Bearing Condition</label>
                <select id="studBearing" onchange="calculate()">
                    <option value="nonbearing">Non-Bearing</option>
                    <option value="bearing1">Bearing (1 Story Above)</option>
                    <option value="bearing2">Bearing (2 Stories Above)</option>
                </select>
            </div>
        </div>

        <div id="results" class="result-container"></div>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; padding:20px; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <div style="background:var(--card); border:2px solid var(--acc); padding:20px; border-radius:12px; max-width:400px;" onclick="event.stopPropagation()">
        <h3 style="color:var(--acc); margin-top:0;">Tributary Help</h3>
        <p>A beam carries half the joist span on each side.</p>
        <p><b>(Side A ÷ 2) + (Side B ÷ 2) = Tributary</b></p>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; padding:12px; background:var(--acc); border:none; border-radius:8px; font-weight:900;">CLOSE</button>
    </div>
</div>

<script>
    function toggleVisibility() {
        const span = document.getElementById('span').value;
        const comp = document.getElementById('component').value;
        document.getElementById('trib_section').style.display = (span > 0 && (comp === 'beam' || comp === 'post')) ? 'block' : 'none';
    }

    function toggleInputs() {
        const comp = document.getElementById('component').value;
        document.getElementById('species_div').style.display = ['floor','ceiling','roof'].includes(comp) ? 'block' : 'none';
        document.getElementById('stud_div').style.display = comp === 'stud' ? 'block' : 'none';
        document.getElementById('mainLabel').innerText = (comp === 'stud' || comp === 'post') ? "Member Height (Feet)" : "Clear Span (Feet)";
        toggleVisibility();
        calculate();
    }

    function calcTrib() {
        const a = parseFloat(document.getElementById('spanA').value) || 0;
        const b = parseFloat(document.getElementById('spanB').value) || 0;
        const total = (a / 2) + (b / 2);
        document.getElementById('tribVal').innerText = total.toFixed(1);
        document.getElementById('trib').value = total.toFixed(1);
        calculate();
    }

    function calculate() {
        const comp = document.getElementById('component').value;
        const span = parseFloat(document.getElementById('span').value) || 0;
        const trib = parseFloat(document.getElementById('trib').value) || 0;
        const houseType = parseInt(document.getElementById('houseType').value);
        const results = document.getElementById('results');
        results.innerHTML = "";
        if (span <= 0) return;

        const species = document.getElementById('species').value;
        const mult = species === 'df' ? 1.15 : 1.0;

        if (['floor', 'ceiling', 'roof'].includes(comp)) {
            const data = {
                floor:   { "2x8": 12.3, "2x10": 15.5, "2x12": 18.9 },
                ceiling: { "2x6": 15.5, "2x8": 20.5, "2x10": 25.5 },
                roof:    { "2x6": 12.5, "2x8": 16.2, "2x10": 20.5, "2x12": 25.0 }
            };
            Object.keys(data[comp]).forEach(size => {
                let max = data[comp][size] * mult;
                if (max >= span) addCard("wood", `${size} ${species.toUpperCase()} #2`, `Max Span: ${max.toFixed(1)}ft`, "✓ CODE OK");
            });
        } 
        else if (comp === 'beam') {
            const load = span * trib * (houseType === 1 ? 40 : houseType === 2 ? 80 : 110);
            if (span <= 10 && load < 15000) addCard("wood", "(3) 2x12 Beam", "Built-up Dimensional", "Nail/Bolt per Code");
            addCard("lvl", "2-Ply 11-7/8\" LVL", "1.9E Engineered", "Standard High-Load");
            if (span > 14 || load > 20000) addCard("steel", "W8 x 18 Steel I-Beam", "Structural W-Shape", "Max Capacity");
        }
        else if (comp === 'stud') {
            const bear = document.getElementById('studBearing').value;
            let rec = (span > 10 || bear === 'bearing2') ? "2x6 SPF" : "2x4 SPF";
            addCard("wood", rec, "Wall Stud", `${span}ft Tall Wall`);
        }
        else if (comp === 'post') {
            let rec = (span > 8) ? "6x6 Post" : "4x4 Post";
            addCard("wood", rec, "Structural Column", `Check footing depth`);
        }
    }

    function addCard(type, title, sub, meta) {
        const div = document.createElement('div');
        div.className = `opt-card ${type}`;
        div.innerHTML = `<div><span style="color:var(--acc); font-size:10px; font-weight:900;">${type.toUpperCase()}</span><div class="opt-meta">${sub}</div><div class="opt-title">${title}</div><div style="color:var(--grn); font-size:13px; font-weight:bold;">${meta}</div></div><div style="color:var(--acc); font-weight:900;">SELECT</div>`;
        document.getElementById('results').appendChild(div);
    }
    toggleInputs();
</script>
</body>
</html>
